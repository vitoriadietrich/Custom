<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Selector</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="card">
        <h2>Choose Your Course</h2>

        <div class="options-container">
            <label class="option">
                <input type="radio" name="course" value="html-css" checked>
                <span class="dot"></span>
                <span class="course-name">HTML & CSS</span>
                <span class="price">100$/year</span>
            </label>

            <label class="option">
                <input type="radio" name="course" value="javascript">
                <span class="dot"></span>
                <span class="course-name">JavaScript</span>
                <span class="price">120$/year</span>
            </label>

            <label class="option">
                <input type="radio" name="course" value="php-mysql">
                <span class="dot"></span>
                <span class="course-name">PHP & MySQL</span>
                <span class="price">150$/year</span>
            </label>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
